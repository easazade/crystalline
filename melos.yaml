name: crystalline_project

command:
  bootstrap:
    runPubGetInParallel: true
  version:
    linkToCommits: false     # disables commit links in generated changelog

packages:
  - example
  - packages/**

# use flutter version set in .fvmrc for development and running melos scripts
scripts:
  all:
    run: |
      melos bs &&
      melos run test &&
      melos run format &&
      melos run check
    description: Run melos bootstrap, test, format & analyze in order

  format:
    run: melos exec -c 1 -- dart format lib test
    description: Run dart format in all packages

  check:
    run: melos exec --fail-fast --ignore="example" -- dart analyze .
    description: Run dart analyze in all packages

  test:
    run: melos exec  -c 1 --ignore="*example*" --ignore="crystalline_builder" -- flutter test --coverage
    description: Run all tests .

  gen:
    run: melos exec  -c 1 -- dart run build_runner build

  test-count:
    run: >
      find packages example -type f -path '*/test/*.dart' 2>/dev/null -exec
      grep -h -cE '^\s*(test|testWidgets)\s*\(' {} \; 2>/dev/null | awk '{s+=$1} END {print s+0}'
    description: Print the number of test() and testWidgets() declarations across all packages.
